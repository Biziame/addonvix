name: Sync Fork con Upstream

on:
  schedule:
    - cron: '0 5 * * *'  # Ogni giorno alle 05:00 UTC (07:00 ora italiana)
  workflow_dispatch:       # Permette anche l'avvio manuale dalla tab Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Aggiungi upstream e sincronizza
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/annamosene/SelfVix.git
          git fetch upstream
          git merge upstream/main --no-edit --allow-unrelated-histories || echo "Nessun aggiornamento"
          git push origin main
